<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox - A Language for WebAssembly</title>
    <link rel="icon" type="image/png" href="fox.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script type="module">
        import { fox } from "./main.js";

        try {
            const { exports } = await fox("main.wasm", {});
            await exports.main.promising();
            Prism.highlightAll();
        } catch (err) {
            document.body.innerHTML = `
                <div style="padding:2rem;color:#f87171;">
                    <h1>Failed to load</h1>
                    <p>${err.message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
