<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox - A Language for WebAssembly</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script type="module">
        import { fox } from "./main.js";

        try {
            const { exports } = await fox("main.wasm", {});
            await exports.main.promising();
        } catch (err) {
            document.body.innerHTML = `
                <div style="padding:2rem;color:#f87171;">
                    <h1>Failed to load</h1>
                    <p>${err.message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
